<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 페이지</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; color: #f1f5f9; min-height: 100vh; }

    .login-wrap {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 48px;
      width: 100%; max-width: 400px;
    }
    .input-field {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px 16px;
      color: #f1f5f9;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-field:focus { border-color: #6366f1; }

    .btn-primary {
      background: #6366f1;
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 15px;
      border: none;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-primary:hover { background: #4f46e5; }
    .btn-primary:active { transform: scale(0.98); }

    .badge-pending {
      background: rgba(245,158,11,0.15);
      color: #fbbf24;
      border: 1px solid rgba(245,158,11,0.3);
      padding: 4px 10px; border-radius: 100px; font-size: 12px; font-weight: 600;
    }
    .badge-done {
      background: rgba(34,197,94,0.15);
      color: #4ade80;
      border: 1px solid rgba(34,197,94,0.3);
      padding: 4px 10px; border-radius: 100px; font-size: 12px; font-weight: 600;
    }

    .btn-toggle-pending {
      background: rgba(34,197,94,0.1);
      color: #4ade80;
      border: 1px solid rgba(34,197,94,0.3);
      padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-toggle-pending:hover { background: rgba(34,197,94,0.25); }

    .btn-toggle-done {
      background: rgba(245,158,11,0.1);
      color: #fbbf24;
      border: 1px solid rgba(245,158,11,0.3);
      padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-toggle-done:hover { background: rgba(245,158,11,0.25); }

    table { width: 100%; border-collapse: collapse; }
    th { background: #1e293b; color: #94a3b8; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: 12px 16px; text-align: left; border-bottom: 1px solid #334155; }
    td { padding: 16px; border-bottom: 1px solid #1e293b; font-size: 14px; vertical-align: top; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .stat-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
    }
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 50;
    }
    .modal-box {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 32px;
      width: 100%; max-width: 520px;
      max-height: 80vh; overflow-y: auto;
    }
  </style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen" class="login-wrap">
  <div class="login-box">
    <h1 style="font-size:22px;font-weight:700;margin-bottom:8px;">🔒 관리자 로그인</h1>
    <p style="color:#64748b;font-size:14px;margin-bottom:32px;">카페바이럴 관리자 페이지</p>
    <div style="display:flex;flex-direction:column;gap:16px;">
      <input type="password" id="pw-input" class="input-field" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')login()">
      <div id="pw-error" style="color:#f87171;font-size:13px;display:none;">비밀번호가 틀렸습니다.</div>
      <button class="btn-primary" onclick="login()">로그인</button>
    </div>
  </div>
</div>

<!-- 대시보드 -->
<div id="dashboard" style="display:none;">

  <!-- 헤더 -->
  <header style="background:#1e293b;border-bottom:1px solid #334155;padding:16px 32px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;">
    <div style="font-size:18px;font-weight:700;">📋 카페바이럴 관리자</div>
    <button onclick="logout()" style="background:transparent;border:1px solid #334155;color:#94a3b8;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;">로그아웃</button>
  </header>

  <div style="padding:32px;max-width:1200px;margin:0 auto;">

    <!-- 통계 -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:32px;">
      <div class="stat-card">
        <div style="color:#94a3b8;font-size:13px;margin-bottom:8px;">전체 신청</div>
        <div id="stat-total" style="font-size:32px;font-weight:700;">-</div>
      </div>
      <div class="stat-card">
        <div style="color:#94a3b8;font-size:13px;margin-bottom:8px;">대기중</div>
        <div id="stat-pending" style="font-size:32px;font-weight:700;color:#fbbf24;">-</div>
      </div>
      <div class="stat-card">
        <div style="color:#94a3b8;font-size:13px;margin-bottom:8px;">완료</div>
        <div id="stat-done" style="font-size:32px;font-weight:700;color:#4ade80;">-</div>
      </div>
      <div class="stat-card">
        <div style="color:#94a3b8;font-size:13px;margin-bottom:8px;">오늘 신청</div>
        <div id="stat-today" style="font-size:32px;font-weight:700;color:#818cf8;">-</div>
      </div>
    </div>

    <!-- 테이블 -->
    <div style="background:#1e293b;border:1px solid #334155;border-radius:12px;overflow:hidden;">
      <div style="padding:20px 24px;border-bottom:1px solid #334155;display:flex;justify-content:space-between;align-items:center;">
        <h2 style="font-size:16px;font-weight:700;">상담 신청 목록</h2>
        <button onclick="loadData()" style="background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.3);color:#818cf8;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;">새로고침</button>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>이름</th>
              <th>연락처</th>
              <th>현재상황/회사</th>
              <th>업종/상품</th>
              <th>상태</th>
              <th>접수일</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr><td colspan="7" style="text-align:center;color:#64748b;padding:40px;">로딩 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- 상세 모달 -->
<div id="modal" class="modal-overlay" style="display:none;" onclick="closeModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
      <h3 style="font-size:18px;font-weight:700;">상세 정보</h3>
      <button onclick="document.getElementById('modal').style.display='none'" style="background:transparent;border:none;color:#94a3b8;font-size:22px;cursor:pointer;">✕</button>
    </div>
    <div id="modal-content"></div>
  </div>
</div>

<script>
  const ADMIN_PW = 'mas15321';
  const SESSION_KEY = 'cafe_admin_auth';

  const { createClient } = supabase;
  const _sb = createClient(
    'https://yxilbtkvqwwglwgpvjjb.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4aWxidGt2cXd3Z2x3Z3B2ampiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDcxODMsImV4cCI6MjA5NTgyMzE4M30.aNxfRGvCFIEPcSIk2TdFXH9aFsdljnt-ppd7JZksNZI'
  );

  function login() {
    const pw = document.getElementById('pw-input').value;
    if (pw === ADMIN_PW) {
      sessionStorage.setItem(SESSION_KEY, '1');
      showDashboard();
    } else {
      document.getElementById('pw-error').style.display = 'block';
    }
  }

  function logout() {
    sessionStorage.removeItem(SESSION_KEY);
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('pw-input').value = '';
  }

  function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadData();
  }

  async function loadData() {
    const { data, error } = await _sb
      .from('consultations')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      document.getElementById('table-body').innerHTML =
        `<tr><td colspan="7" style="text-align:center;color:#f87171;padding:40px;">데이터를 불러올 수 없습니다.</td></tr>`;
      return;
    }

    const today = new Date().toISOString().slice(0, 10);
    const total   = data.length;
    const pending = data.filter(r => r.status === 'pending').length;
    const done    = data.filter(r => r.status === 'done').length;
    const todayCnt = data.filter(r => r.created_at && r.created_at.slice(0, 10) === today).length;

    document.getElementById('stat-total').textContent   = total;
    document.getElementById('stat-pending').textContent = pending;
    document.getElementById('stat-done').textContent    = done;
    document.getElementById('stat-today').textContent   = todayCnt;

    if (data.length === 0) {
      document.getElementById('table-body').innerHTML =
        `<tr><td colspan="7" style="text-align:center;color:#64748b;padding:40px;">아직 신청이 없습니다.</td></tr>`;
      return;
    }

    document.getElementById('table-body').innerHTML = data.map(r => {
      const date = r.created_at ? new Date(r.created_at).toLocaleDateString('ko-KR') : '-';
      const badge = r.status === 'done'
        ? `<span class="badge-done">완료</span>`
        : `<span class="badge-pending">대기중</span>`;
      const toggleBtn = r.status === 'done'
        ? `<button class="btn-toggle-done" onclick="toggleStatus('${r.id}','pending')">대기중으로</button>`
        : `<button class="btn-toggle-pending" onclick="toggleStatus('${r.id}','done')">완료 처리</button>`;

      return `<tr>
        <td style="font-weight:600;">${esc(r.name)}</td>
        <td style="color:#94a3b8;">${esc(r.contact)}</td>
        <td style="max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(r.company || '-')}</td>
        <td style="max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(r.product_type || '-')}</td>
        <td>${badge}</td>
        <td style="color:#64748b;font-size:13px;">${date}</td>
        <td style="display:flex;gap:8px;flex-wrap:wrap;">
          ${toggleBtn}
          <button onclick='showDetail(${JSON.stringify(r)})' style="background:rgba(255,255,255,0.05);border:1px solid #334155;color:#94a3b8;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;">상세</button>
        </td>
      </tr>`;
    }).join('');
  }

  async function toggleStatus(id, newStatus) {
    const { error } = await _sb
      .from('consultations')
      .update({ status: newStatus })
      .eq('id', id);
    if (!error) loadData();
  }

  function showDetail(r) {
    document.getElementById('modal-content').innerHTML = `
      <div style="display:flex;flex-direction:column;gap:16px;">
        <div><div style="color:#64748b;font-size:12px;margin-bottom:4px;">이름</div><div style="font-weight:600;">${esc(r.name)}</div></div>
        <div><div style="color:#64748b;font-size:12px;margin-bottom:4px;">연락처</div><div>${esc(r.contact)}</div></div>
        <div><div style="color:#64748b;font-size:12px;margin-bottom:4px;">현재 상황 / 회사명</div><div style="line-height:1.7;">${esc(r.company || '-')}</div></div>
        <div><div style="color:#64748b;font-size:12px;margin-bottom:4px;">업종 및 상품</div><div style="line-height:1.7;">${esc(r.product_type || '-')}</div></div>
        <div><div style="color:#64748b;font-size:12px;margin-bottom:4px;">상태</div><div>${r.status === 'done' ? '<span class="badge-done">완료</span>' : '<span class="badge-pending">대기중</span>'}</div></div>
        <div><div style="color:#64748b;font-size:12px;margin-bottom:4px;">접수일시</div><div style="color:#64748b;font-size:13px;">${r.created_at ? new Date(r.created_at).toLocaleString('ko-KR') : '-'}</div></div>
      </div>
    `;
    document.getElementById('modal').style.display = 'flex';
  }

  function closeModal(e) {
    document.getElementById('modal').style.display = 'none';
  }

  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // 세션 유지
  if (sessionStorage.getItem(SESSION_KEY) === '1') showDashboard();
</script>
</body>
</html>
